<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#073f52" />
  <link rel="manifest" href="manifest.json" />
  <title>Smartpay — Учет поездок</title>
  <style>
    :root{--bg1:#052f3f;--bg2:#111827;--glass:rgba(255,255,255,.13);--border:rgba(255,255,255,.22);--text:#fff;--muted:#b8ddf3;--green:#22c55e;--red:#ef4444;--shadow:0 24px 80px rgba(0,0,0,.28)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;font-family:Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(14,165,233,.42),transparent 34%),radial-gradient(circle at bottom right,rgba(109,40,217,.42),transparent 36%),linear-gradient(135deg,var(--bg1),var(--bg2));overflow-x:hidden}
    @keyframes rise{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulseSave{0%,100%{transform:scale(1)}50%{transform:scale(.985);box-shadow:0 0 32px rgba(34,197,94,.45)}}
    .app{width:min(1180px,100%);margin:0 auto;padding:22px 22px 28px}
    .header{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px;animation:rise .45s ease both}
    .brand{display:flex;align-items:center;gap:14px}
    .logoBox{width:60px;height:60px;border-radius:22px;background:linear-gradient(135deg,rgba(255,255,255,.24),rgba(255,255,255,.08));display:grid;place-items:center;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;padding:8px}
    .logoBox img{width:100%;height:100%;object-fit:contain}
    h1{margin:0;font-size:30px}.subtitle,.topUser{color:var(--muted);font-size:13px;margin-top:4px}
    .grid{display:grid;grid-template-columns:1.08fr .92fr;gap:18px;align-items:start}
    .card{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:28px;padding:20px;box-shadow:var(--shadow);animation:rise .5s ease both}
    .card h2{margin:0 0 16px;font-size:20px}
    label{display:block;margin-bottom:7px;color:var(--muted);font-size:13px;font-weight:800}
    input,select,textarea{width:100%;min-width:0;border:1px solid rgba(255,255,255,.22);border-radius:18px;padding:14px;outline:none;color:#fff;background:rgba(255,255,255,.13);font-size:15px;margin-bottom:14px}
    input:focus,select:focus,textarea:focus{border-color:rgba(14,165,233,.8);box-shadow:0 0 0 4px rgba(14,165,233,.14)}
    option{color:#111827}textarea{resize:vertical;min-height:76px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .mobileTwo{display:grid;grid-template-columns:minmax(0,42%) minmax(0,58%);gap:10px;align-items:end}
    input[type=date]{padding:10px 8px;font-size:14px;max-width:100%}
    .transport{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    button{border:none;color:#fff;padding:14px 18px;border-radius:18px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#6d28d9,#2563eb);transition:.18s ease}
    button:active{transform:scale(.98)}.btnFull{width:100%;margin-top:6px}.btnGreen{background:linear-gradient(135deg,#22c55e,#16a34a)}.btnRed{background:linear-gradient(135deg,#ef4444,#b91c1c)}.btnGhost{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25)}
    .transport button{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25)}.transport button.active{background:linear-gradient(135deg,#0ea5e9,#2563eb)}
    .saveBtn.saving{pointer-events:none;animation:pulseSave .9s ease-in-out infinite;opacity:.92}.saveBtn.saving:before{content:"";display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;margin-right:8px;vertical-align:-3px;animation:spin .8s linear infinite}
    .totalBox{padding:18px;background:linear-gradient(135deg,rgba(14,165,233,.26),rgba(34,197,94,.18));border:1px solid rgba(14,165,233,.45);border-radius:22px;margin-bottom:14px}.totalBox span{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}.totalBox strong{font-size:28px}
    .switchLine{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:12px}.switchLine input{width:22px;height:22px;margin:0}
    .hidden{display:none!important}.filters{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:14px}.reportGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    .mini,.employeeReport,.trip{padding:14px;border-radius:20px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16)}.mini span{color:var(--muted);font-size:12px}.mini strong{display:block;font-size:20px;margin-top:5px}.employeeReport{margin-bottom:8px;font-size:14px}
    .exportActions{display:none;gap:10px;margin-top:10px}.exportActions.show{display:grid;grid-template-columns:1fr 1fr}
    .list{display:grid;gap:12px;max-height:520px;overflow:auto}.tripTop{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}.tripTitle{font-weight:900}.tripMeta{color:var(--muted);font-size:13px;line-height:1.5}.tripTotal{font-size:19px;font-weight:950;color:#a7f3d0;white-space:nowrap}
    .smallRemove{min-height:42px;padding:10px 12px;border-radius:14px;font-size:13px;width:auto;margin-bottom:14px}.hint{color:var(--muted);font-size:12px;margin-top:-6px;margin-bottom:12px}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);padding:14px 18px;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.2);border-radius:18px;display:none;z-index:1000}
    .loginScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at top left,rgba(14,165,233,.38),transparent 36%),linear-gradient(135deg,#052f3f,#111827)}
    .loginCard{width:min(390px,100%);padding:22px;border-radius:28px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);box-shadow:var(--shadow);backdrop-filter:blur(24px);animation:rise .4s ease both}.loginLogo{width:72px;height:72px;border-radius:24px;background:rgba(255,255,255,.13);padding:10px;margin-bottom:14px}.loginLogo img{width:100%;height:100%;object-fit:contain}
    @media(max-width:768px){.app{padding:12px 12px 28px}h1{font-size:22px}.logoBox{width:48px;height:48px;border-radius:17px;padding:6px}.header{flex-direction:column;align-items:stretch}.grid{grid-template-columns:1fr}.card{padding:16px;border-radius:24px}.row,.filters,.reportGrid,.exportActions.show{grid-template-columns:1fr;gap:0}.mobileTwo{grid-template-columns:minmax(0,42%) minmax(0,58%);gap:8px}.transport{grid-template-columns:1fr 1fr;gap:8px}.mobileTwo input,.mobileTwo select,.transport button{min-height:42px;font-size:13px;padding:9px 8px;border-radius:14px}input,select,textarea,button{font-size:16px;min-height:50px}.tripTop{flex-direction:column}.tripTotal{font-size:22px}.list{max-height:none}.extraPointRow{grid-template-columns:1fr auto;gap:8px}.smallRemove{min-height:34px;padding:7px 10px;font-size:11px;margin-top:-8px;margin-bottom:12px;border-radius:12px}}
  </style>
</head>
<body>
  <div id="loginScreen" class="loginScreen">
    <div class="loginCard">
      <div class="loginLogo"><img src="smartpay-logo.png" alt="Smartpay"></div>
      <h2 style="margin:0 0 6px;">Вход в систему</h2>
      <div class="subtitle" style="margin-bottom:18px;">Введите сотрудника и PIN-код</div>
      <label>Сотрудник</label><select id="loginEmployee"></select>
      <label>PIN-код</label><input type="password" id="loginPin" placeholder="Например: 1234" inputmode="numeric">
      <button class="btnFull btnGreen" onclick="login()">Войти</button>
    </div>
  </div>

  <div class="app">
    <div class="header">
      <div class="brand">
        <div class="logoBox"><img src="smartpay-logo.png" alt="Smartpay"></div>
        <div><h1>🚗 Учет поездок</h1><div class="subtitle">Smartpay — контроль поездок сотрудников</div><div class="topUser" id="topUser"></div></div>
      </div>
      <button class="btnGhost" onclick="logout()">Выйти</button>
    </div>

    <div class="grid">
      <div class="card hidden" id="formCard">
        <button class="btnFull btnGhost" onclick="toggleForm()">✖️ Скрыть новую поездку</button>
        <h2 style="margin-top:16px;">Новая поездка</h2>
        <div class="mobileTwo">
          <div><label>Дата поездки</label><input type="date" id="date"></div>

        <div id="routeFields">
          <div class="row">
            <div><label>Точка А</label><input list="pointsList" id="from" placeholder="Откуда"></div>
            <div><label>Точка Б</label><input list="pointsList" id="to" placeholder="Куда"></div>
          </div>
        </div>
        <datalist id="pointsList"></datalist>
        <div class="hint">Можно выбрать точку из списка и дописать текст, например: “Банк Эсхата”.</div>
        <button class="btnFull btnGhost" onclick="addRoutePoint()">+ Добавить промежуточную точку</button>

        <label style="margin-top:14px;">Тип транспорта</label>
        <div class="transport">
          <button id="carBtn" class="active" onclick="setTransport('car')">🚗 Своя</button>
          <button id="taxiBtn" onclick="setTransport('taxi')">🚕 Такси</button>
        </div>

        <div id="carFields" class="row">
          <div><label>Километраж</label><input type="number" id="km" min="0" step="0.1" placeholder="Например: 12"></div>
          <div><label>Время поездки, минут</label><input type="number" id="minutes" min="0" step="1" placeholder="Например: 21"></div>
        </div>
        <div id="taxiFields" class="hidden"><label>Сумма такси</label><input type="number" id="taxiAmount" min="0" step="0.01" placeholder="Например: 35"></div>

        <div class="switchLine"><input type="checkbox" id="roundTrip"><strong>Туда и обратно</strong></div>
        <label>Комментарий</label><textarea id="comment" placeholder="Например: встреча с клиентом"></textarea>
        <div class="totalBox"><span>Итоговая сумма</span><strong id="totalPreview">0.00 сомони</strong></div>
        <button class="btnFull btnGreen saveBtn" id="saveBtn" onclick="saveTrip()">✅ Сохранить поездку</button>
      </div>

      <div class="card">
        <button class="btnFull btnGhost" onclick="toggleForm()" id="formToggleBtn">➕ Добавить новую поездку</button>
        <button class="btnFull btnGhost" onclick="toggleReport()" id="reportToggleBtn" style="margin-top:12px;">📊 Открыть отчет за месяц</button>
        <div id="reportPanel" class="hidden" style="margin-top:16px;">
          <h2>Отчет за месяц</h2>
          <div class="filters"><select id="monthFilter" onchange="applyMonthFilter()"><option value="">Все месяцы</option></select><button onclick="applyMonthFilter()">Показать</button></div>
          <div class="reportGrid"><div class="mini"><span>Поездок</span><strong id="reportCount">0</strong></div><div class="mini"><span>Сумма</span><strong id="reportTotal">0</strong></div><div class="mini"><span>Месяц</span><strong id="reportMonth">Все</strong></div></div>
          <div id="employeeReport"></div>
          <button class="btnFull btnGhost" onclick="toggleExportActions()" id="exportToggleBtn">📤 Экспорт отчета</button>
          <div class="exportActions" id="exportActions"><button onclick="exportPDF()">📄 PDF</button><button onclick="exportExcel()">📊 Excel</button></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;"><h2>Список поездок</h2><div id="tripList" class="list"></div></div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwZL-Ye2q7HzCUz_-HRIAe4iY8On5NdL1nmRl8JLaUYTs_EWBQLqRCOojFFdWs84SgI/exec';
    let transportType='car', allTrips=[], currentMonth='', routePointIndex=3, employeesCache=[], pointsCache=[];
    let currentUser=localStorage.getItem('smartpay_user')||'', currentRole=localStorage.getItem('smartpay_role')||'';

    document.addEventListener('DOMContentLoaded',()=>{
      date.valueAsDate=new Date();
      ['km','minutes','taxiAmount','roundTrip'].forEach(id=>{document.getElementById(id).addEventListener('input',updatePreview);document.getElementById(id).addEventListener('change',updatePreview)});
      ['from','to'].forEach(id=>document.getElementById(id).addEventListener('change',applyRouteHistory));
      registerPWA(); loadLoginEmployees();
      if(currentUser){loginScreen.style.display='none';reloadData()}
    });

    function api(action,params={}){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*99999);params.action=action;params.callback=cb;const q=Object.keys(params).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(params[k])).join('&');const s=document.createElement('script');s.src=API_URL+'?'+q;window[cb]=d=>{delete window[cb];s.remove();resolve(d)};s.onerror=()=>{delete window[cb];s.remove();reject(new Error('Ошибка подключения'))};document.body.appendChild(s)})}

    async function loadLoginEmployees(){try{const d=await api('init');loginEmployee.innerHTML='<option value="">Выберите сотрудника</option>';(d.employees||[]).forEach(e=>loginEmployee.innerHTML+=`<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`)}catch(e){alert('Ошибка загрузки сотрудников: '+e.message)}}
    async function login(){if(!loginEmployee.value||!loginPin.value)return alert('Выберите сотрудника и PIN');const r=await api('login',{employee:loginEmployee.value,pin:loginPin.value});if(!r.ok)return alert(r.error||'Неверный PIN');currentUser=r.employee;currentRole=r.role||'user';localStorage.setItem('smartpay_user',currentUser);localStorage.setItem('smartpay_role',currentRole);loginScreen.style.display='none';loginPin.value='';reloadData()}
    function logout(){localStorage.removeItem('smartpay_user');localStorage.removeItem('smartpay_role');currentUser='';currentRole='';allTrips=[];loginScreen.style.display='flex';tripList.innerHTML='';topUser.textContent='';loadLoginEmployees()}

    async function reloadData(){try{showToast('Загрузка данных...');const d=await api('init',{employee:currentUser,role:currentRole});if(!d.ok)throw new Error(d.error||'Ошибка загрузки');allTrips=d.trips||[];employeesCache=d.employees||[];pointsCache=d.points||[];fillEmployeeSelect();fillPointsDatalist();fillMonths(d.months||[]);setEmployeeByRole();applyMonthFilter();updatePreview();topUser.textContent=currentUser?`Вход: ${currentUser} · ${currentRole==='admin'?'админ':'сотрудник'}`:'';showToast('Данные обновлены')}catch(e){alert('Ошибка: '+e.message)}}

    function fillEmployeeSelect(){employee.innerHTML='<option value="">Выберите сотрудника</option>';employeesCache.forEach(e=>employee.innerHTML+=`<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`)}
    function setEmployeeByRole(){if(currentRole==='admin'){employee.disabled=false}else{employee.value=currentUser;employee.disabled=true}}
    function fillPointsDatalist(){pointsList.innerHTML='';pointsCache.forEach(p=>pointsList.innerHTML+=`<option value="${escapeHtml(p)}"></option>`)}
    function fillMonths(ms){const old=monthFilter.value;monthFilter.innerHTML='<option value="">Все месяцы</option>';ms.forEach(m=>monthFilter.innerHTML+=`<option value="${m}">${formatMonthName(m)}</option>`);if(old)monthFilter.value=old}
    function formatMonthName(m){const n={'01':'Январь','02':'Февраль','03':'Март','04':'Апрель','05':'Май','06':'Июнь','07':'Июль','08':'Август','09':'Сентябрь','10':'Октябрь','11':'Ноябрь','12':'Декабрь'};if(!m||!m.includes('-'))return m;const [y,mm]=m.split('-');return `${n[mm]||mm} ${y}`}

    function toggleForm(){formCard.classList.toggle('hidden');formToggleBtn.textContent=formCard.classList.contains('hidden')?'➕ Добавить новую поездку':'✖️ Скрыть новую поездку';if(!formCard.classList.contains('hidden'))setTimeout(()=>formCard.scrollIntoView({behavior:'smooth'}),80)}
    function toggleReport(){reportPanel.classList.toggle('hidden');reportToggleBtn.textContent=reportPanel.classList.contains('hidden')?'📊 Открыть отчет за месяц':'📊 Скрыть отчет за месяц'}
    function toggleExportActions(){exportActions.classList.toggle('show');exportToggleBtn.textContent=exportActions.classList.contains('show')?'📤 Скрыть экспорт':'📤 Экспорт отчета'}
    function setTransport(t){transportType=t;carBtn.classList.toggle('active',t==='car');taxiBtn.classList.toggle('active',t==='taxi');carFields.classList.toggle('hidden',t!=='car');taxiFields.classList.toggle('hidden',t!=='taxi');updatePreview()}

    function addRoutePoint(){const letters={3:'C',4:'D',5:'E',6:'F',7:'G',8:'H'},l=letters[routePointIndex]||routePointIndex;const b=document.createElement('div');b.className='row extraPointRow';b.innerHTML=`<div><label>Точка ${l}</label><input list="pointsList" class="extraPoint" placeholder="Введите или выберите точку ${l}"></div><div><label>&nbsp;</label><button type="button" class="btnRed smallRemove" onclick="this.closest('.extraPointRow').remove();applyRouteHistory();">Удалить</button></div>`;routeFields.appendChild(b);b.querySelector('.extraPoint').addEventListener('change',applyRouteHistory);routePointIndex++}
    function applyRouteHistory(){const f=from.value.trim(),t=to.value.trim();if(!f||!t)return;const r=allTrips.find(x=>String(x.from||'').startsWith(f)&&String(x.from||'').endsWith(t));if(!r)return;const parts=String(r.from||'').split('→').map(x=>x.trim()).filter(Boolean);if(parts.length<=2)return;document.querySelectorAll('.extraPointRow').forEach(x=>x.remove());routePointIndex=3;parts.slice(1,-1).forEach(p=>{addRoutePoint();document.querySelectorAll('.extraPoint')[document.querySelectorAll('.extraPoint').length-1].value=p});showToast('Маршрут подставлен из истории')}

    function getPayload(){const extra=[...document.querySelectorAll('.extraPoint')].map(i=>i.value.trim()).filter(Boolean),f=from.value.trim(),t=to.value.trim(),emp=currentRole==='admin'?employee.value.trim():currentUser;return{date:date.value,employee:emp,from:f,to:t,extraPoints:extra,routeText:[f,...extra,t].filter(Boolean).join(' → '),transportType,km:+km.value||0,minutes:+minutes.value||0,taxiAmount:+taxiAmount.value||0,roundTrip:roundTrip.checked,comment:comment.value.trim()}}
    function calculateLocal(p){let total=0;if(p.transportType==='car'){total=(p.km<=0?0:10+Math.max(0,p.km-3)*3)+Math.max(0,p.minutes-20)*.10}else total=p.taxiAmount;if(p.roundTrip)total*=2;return Math.round((total+Number.EPSILON)*100)/100}
    function updatePreview(){totalPreview.textContent=calculateLocal(getPayload()).toFixed(2)+' сомони'}

    async function saveTrip(){const btn=saveBtn;try{const p=getPayload();if(!p.date)return alert('Укажите дату');if(!p.employee)return alert('Укажите сотрудника');if(!p.from)return alert('Укажите точку А');if(!p.to)return alert('Укажите конечную точку');btn.classList.add('saving');btn.textContent='Сохраняем поездку...';const r=await api('addTrip',{payload:JSON.stringify(p)});if(!r.ok)throw new Error(r.error||'Ошибка сохранения');allTrips=r.trips||[];clearForm();fillMonths(r.months||[]);applyMonthFilter();showToast('Поездка сохранена');formCard.classList.add('hidden');formToggleBtn.textContent='➕ Добавить новую поездку'}catch(e){alert('Ошибка сохранения: '+e.message)}finally{btn.classList.remove('saving');btn.textContent='✅ Сохранить поездку'}}
    function clearForm(){date.valueAsDate=new Date();from.value='';to.value='';km.value='';minutes.value='';taxiAmount.value='';comment.value='';roundTrip.checked=false;document.querySelectorAll('.extraPointRow').forEach(x=>x.remove());routePointIndex=3;setEmployeeByRole();updatePreview()}
    function applyMonthFilter(){currentMonth=monthFilter.value;const f=currentMonth?allTrips.filter(x=>x.month===currentMonth):allTrips;renderTrips(f);renderReport(f)}
    function getFilteredTrips(){return currentMonth?allTrips.filter(x=>x.month===currentMonth):allTrips}
    function renderTrips(ts){if(!ts.length){tripList.innerHTML='<div class="trip">Пока нет поездок</div>';return}tripList.innerHTML=ts.map(t=>`<div class="trip"><div class="tripTop"><div><div class="tripTitle">${escapeHtml(t.employee)}</div><div class="tripMeta">${escapeHtml(t.date)} · ${escapeHtml(t.transport)}</div></div><div class="tripTotal">${Number(t.total).toFixed(2)} с.</div></div><div class="tripMeta">📍 ${escapeHtml(t.from)}<br>${t.transport==='Такси'?`🚕 Такси: ${t.taxiAmount||0} с.`:`🚗 ${t.km||0} км · ${t.minutes||0} мин`}${t.roundTrip==='Да'?'<br>🔁 Туда и обратно':''}${t.comment?`<br>💬 ${escapeHtml(t.comment)}`:''}</div></div>`).join('')}
    function renderReport(ts){const total=ts.reduce((s,t)=>s+Number(t.total||0),0);reportCount.textContent=ts.length;reportTotal.textContent=total.toFixed(2);reportMonth.textContent=currentMonth?formatMonthName(currentMonth):'Все';const map={};ts.forEach(t=>{if(!map[t.employee])map[t.employee]={count:0,total:0};map[t.employee].count++;map[t.employee].total+=Number(t.total||0)});employeeReport.innerHTML=Object.keys(map).map(e=>`<div class="employeeReport"><strong>${escapeHtml(e)}</strong><br>Поездок: ${map[e].count} · Сумма: ${map[e].total.toFixed(2)} сомони</div>`).join('')||'<div class="employeeReport">Нет данных</div>'}
    function exportPDF(){const ts=getFilteredTrips(),m=currentMonth?formatMonthName(currentMonth):'Все месяцы';let h=`<html><head><title>Отчет Smartpay</title><style>body{font-family:Arial;padding:24px;color:#111827}h1{color:#073f52}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border:1px solid #d1d5db;padding:8px;font-size:12px}th{background:#073f52;color:white}.total{margin-top:18px;font-size:18px;font-weight:bold}</style></head><body><h1>Smartpay — отчет по поездкам</h1><p>Период: ${m}</p><table><thead><tr><th>Дата</th><th>Сотрудник</th><th>Маршрут</th><th>Транспорт</th><th>Км</th><th>Мин</th><th>Сумма</th></tr></thead><tbody>`;ts.forEach(t=>h+=`<tr><td>${escapeHtml(t.date)}</td><td>${escapeHtml(t.employee)}</td><td>${escapeHtml(t.from)}</td><td>${escapeHtml(t.transport)}</td><td>${t.km||''}</td><td>${t.minutes||''}</td><td>${Number(t.total||0).toFixed(2)}</td></tr>`);const total=ts.reduce((s,t)=>s+Number(t.total||0),0);h+=`</tbody></table><div class="total">Итого: ${total.toFixed(2)} сомони</div></body></html>`;const w=window.open('','_blank');w.document.write(h);w.document.close();w.print()}
    function exportExcel(){const ts=getFilteredTrips(),m=currentMonth?formatMonthName(currentMonth):'Все месяцы';let csv='\\uFEFFДата;Сотрудник;Маршрут;Транспорт;Километраж;Время;Такси;Туда и обратно;Сумма;Комментарий\\n';ts.forEach(t=>{csv+=[t.date,t.employee,t.from,t.transport,t.km||'',t.minutes||'',t.taxiAmount||'',t.roundTrip||'',Number(t.total||0).toFixed(2),t.comment||''].map(v=>`"${String(v).replaceAll('"','""')}"`).join(';')+'\\n'});const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`Smartpay_report_${m}.csv`;a.click()}
    function showToast(txt){toast.textContent=txt;toast.style.display='block';setTimeout(()=>toast.style.display='none',1800)}
    function escapeHtml(x){return String(x||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
    function registerPWA(){if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').then(r=>r.update()).catch(()=>{})}
  </script>
</body>
