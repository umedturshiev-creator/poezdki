<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#073f52" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Smartpay Trips" />
  <link rel="manifest" href="manifest.json" />

  <title>Smartpay — Учет поездок</title>

  <style>
    :root{
      --bg1:#052f3f;
      --bg2:#111827;
      --glass:rgba(255,255,255,.13);
      --border:rgba(255,255,255,.22);
      --text:#ffffff;
      --muted:#b8ddf3;
      --green:#22c55e;
      --red:#ef4444;
      --shadow:0 24px 80px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left,rgba(14,165,233,.42),transparent 34%),
        radial-gradient(circle at bottom right,rgba(109,40,217,.42),transparent 36%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      overflow-x:hidden;
    }

    @keyframes rise{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulseSave{0%,100%{transform:scale(1)}50%{transform:scale(.985);box-shadow:0 0 32px rgba(34,197,94,.45)}}

    .app{
      width:min(1180px,100%);
      margin:0 auto;
      padding:22px 22px 28px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
      margin-bottom:18px;
      animation:rise .45s ease both;
    }

    .brand{display:flex;align-items:center;gap:14px}

    .logoBox{
      width:60px;
      height:60px;
      border-radius:22px;
      background:linear-gradient(135deg,rgba(255,255,255,.24),rgba(255,255,255,.08));
      display:grid;
      place-items:center;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      overflow:hidden;
      padding:8px;
    }

    .logoBox img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    h1{margin:0;font-size:30px;letter-spacing:-.6px}
    .subtitle,.topUser{color:var(--muted);font-size:13px;margin-top:4px}

    .grid{
      display:grid;
      grid-template-columns:1.08fr .92fr;
      gap:18px;
      align-items:start;
    }

    .card{
      background:var(--glass);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      border:1px solid var(--border);
      border-radius:28px;
      padding:20px;
      box-shadow:var(--shadow);
      animation:rise .5s ease both;
    }

    .card h2{margin:0 0 16px;font-size:20px;letter-spacing:-.25px}

    label{
      display:block;
      margin-bottom:7px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
    }

    input,select,textarea{
      width:100%;
      min-width:0;
      border:1px solid rgba(255,255,255,.22);
      border-radius:18px;
      padding:14px;
      outline:none;
      color:#fff;
      background:rgba(255,255,255,.13);
      font-size:15px;
      margin-bottom:14px;
      transition:.2s ease;
    }

    input:focus,select:focus,textarea:focus{
      border-color:rgba(14,165,233,.8);
      box-shadow:0 0 0 4px rgba(14,165,233,.14);
      background:rgba(255,255,255,.18);
    }

    option{color:#111827}
    textarea{resize:vertical;min-height:76px}

    input[type=date]{
      padding:10px 8px;
      font-size:14px;
      max-width:100%;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .transport{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }

    button{
      border:none;
      color:#fff;
      padding:14px 18px;
      border-radius:18px;
      font-weight:900;
      cursor:pointer;
      background:linear-gradient(135deg,#6d28d9,#2563eb);
      transition:.18s ease;
      box-shadow:0 12px 30px rgba(0,0,0,.16);
    }

    button:active{transform:scale(.98)}
    button:hover{filter:brightness(1.08);transform:translateY(-1px)}

    .btnFull{width:100%;margin-top:6px}
    .btnGreen{background:linear-gradient(135deg,#22c55e,#16a34a)}
    .btnRed{background:linear-gradient(135deg,#ef4444,#b91c1c)}
    .btnGhost{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);box-shadow:none}

    .transport button{
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.25);
      box-shadow:none;
    }

    .transport button.active{
      background:linear-gradient(135deg,#0ea5e9,#2563eb);
      box-shadow:0 14px 32px rgba(14,165,233,.22);
    }

    .saveBtn.saving{
      pointer-events:none;
      animation:pulseSave .9s ease-in-out infinite;
      opacity:.92;
    }

    .saveBtn.saving::before{
      content:"";
      display:inline-block;
      width:16px;
      height:16px;
      border:3px solid rgba(255,255,255,.45);
      border-top-color:#fff;
      border-radius:50%;
      margin-right:8px;
      vertical-align:-3px;
      animation:spin .8s linear infinite;
    }

    .totalBox{
      padding:18px;
      background:linear-gradient(135deg,rgba(14,165,233,.26),rgba(34,197,94,.18));
      border:1px solid rgba(14,165,233,.45);
      border-radius:22px;
      margin-bottom:14px;
    }

    .totalBox span{
      display:block;
      color:var(--muted);
      font-size:13px;
      margin-bottom:6px;
    }

    .totalBox strong{font-size:28px;letter-spacing:-.5px}

    .switchLine{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:12px;
    }

    .switchLine input{width:22px;height:22px;margin:0}

    .hidden{display:none!important}

    .filters{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      margin-bottom:14px;
    }

    .reportGrid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-bottom:14px;
    }

    .mini,.employeeReport,.trip{
      padding:14px;
      border-radius:20px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
    }

    .mini span{color:var(--muted);font-size:12px}
    .mini strong{display:block;font-size:20px;margin-top:5px}

    .employeeReport{
      margin-bottom:8px;
      font-size:14px;
    }

    .exportActions{
      display:none;
      gap:10px;
      margin-top:10px;
    }

    .exportActions.show{
      display:grid;
      grid-template-columns:1fr 1fr;
    }

    .list{
      display:grid;
      gap:12px;
      max-height:520px;
      overflow:auto;
      padding-right:4px;
    }

    .trip{
      transition:.2s ease;
      animation:rise .35s ease both;
    }

    .tripTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .tripTitle{font-weight:900}
    .tripMeta{color:var(--muted);font-size:13px;line-height:1.5}
    .tripTotal{font-size:19px;font-weight:950;color:#a7f3d0;white-space:nowrap}

    .extraPointRow{position:relative;align-items:end}

    .smallRemove{
      min-height:42px;
      padding:10px 12px;
      border-radius:14px;
      font-size:13px;
      width:auto;
      margin-bottom:14px;
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      margin-top:-6px;
      margin-bottom:12px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      padding:14px 18px;
      background:rgba(0,0,0,.78);
      border:1px solid rgba(255,255,255,.2);
      border-radius:18px;
      display:none;
      z-index:1000;
      box-shadow:var(--shadow);
    }

    .loginScreen{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:
        radial-gradient(circle at top left,rgba(14,165,233,.38),transparent 36%),
        linear-gradient(135deg,#052f3f,#111827);
    }

    .loginCard{
      width:min(390px,100%);
      padding:22px;
      border-radius:28px;
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.22);
      box-shadow:var(--shadow);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      animation:rise .4s ease both;
    }

    .loginLogo{
      width:72px;
      height:72px;
      border-radius:24px;
      background:rgba(255,255,255,.13);
      padding:10px;
      margin-bottom:14px;
    }

    .loginLogo img{width:100%;height:100%;object-fit:contain}

    @media(max-width:768px){
      .app{padding:12px 12px 28px}
      h1{font-size:22px}
      .subtitle{font-size:12px}
      .logoBox{width:48px;height:48px;border-radius:17px;padding:6px}
      .header{flex-direction:column;align-items:stretch;gap:12px}
      .brand{align-items:center}
      .grid{grid-template-columns:1fr;gap:14px}
      .card{padding:16px;border-radius:24px}
      .row,.filters,.reportGrid,.exportActions.show{
        grid-template-columns:1fr;
        gap:0;
      }
      .transport{
        grid-template-columns:1fr 1fr;
        gap:8px;
      }
      .transport button{
        min-height:42px;
        font-size:13px;
        padding:9px 8px;
        border-radius:14px;
      }
      input,select,textarea,button{
        font-size:16px;
        min-height:50px;
      }
      .tripTop{flex-direction:column}
      .tripTotal{font-size:22px}
      .list{max-height:none}
      .extraPointRow{
        grid-template-columns:1fr auto;
        gap:8px;
      }
      .smallRemove{
        min-height:34px;
        padding:7px 10px;
        font-size:11px;
        margin-top:-8px;
        margin-bottom:12px;
        border-radius:12px;
      }
    }
  </style>
</head>

<body>
  <div id="loginScreen" class="loginScreen">
    <div class="loginCard">
      <div class="loginLogo"><img src="smartpay-logo.png" alt="Smartpay"></div>
      <h2 style="margin:0 0 6px;">Вход в систему</h2>
      <div class="subtitle" style="margin-bottom:18px;">Введите имя сотрудника и PIN-код</div>

      <label>Сотрудник</label>
      <input type="text" id="loginEmployee" placeholder="Введите имя сотрудника" autocomplete="username">

      <label>PIN-код</label>
      <input type="password" id="loginPin" placeholder="Например: 1234" inputmode="numeric" autocomplete="current-password">

      <button class="btnFull btnGreen" onclick="login()">Войти</button>
    </div>
  </div>

  <div class="app">
    <div class="header">
      <div class="brand">
        <div class="logoBox"><img src="smartpay-logo.png" alt="Smartpay"></div>
        <div>
          <h1>🚗 Учет поездок</h1>
          <div class="subtitle">Smartpay — контроль поездок сотрудников</div>
          <div class="topUser" id="topUser"></div>
        </div>
      </div>
      <button class="btnGhost" onclick="logout()">Выйти</button>
    </div>

    <div class="grid">
      <div class="card hidden" id="formCard">
        <button class="btnFull btnGhost" onclick="toggleForm()">✖️ Скрыть новую поездку</button>

        <h2 style="margin-top:16px;">Новая поездка</h2>

        <div>
          <label>Дата поездки</label>
          <input type="date" id="date">
        </div>

        <div id="routeFields">
          <div class="row">
            <div>
              <label>Точка А</label>
              <input list="pointsList" id="from" placeholder="Откуда">
            </div>
            <div>
              <label>Точка Б</label>
              <input list="pointsList" id="to" placeholder="Куда">
            </div>
          </div>
        </div>

        <datalist id="pointsList"></datalist>

        <div class="hint">Можно выбрать точку из списка и дописать текст, например: “Банк Эсхата”.</div>

        <button class="btnFull btnGhost" onclick="addRoutePoint()">+ Добавить промежуточную точку</button>

        <label style="margin-top:14px;">Тип транспорта</label>
        <div class="transport">
          <button id="carBtn" class="active" onclick="setTransport('car')">🚗 Своя</button>
          <button id="taxiBtn" onclick="setTransport('taxi')">🚕 Такси</button>
        </div>

        <div id="carFields" class="row">
          <div>
            <label>Километраж</label>
            <input type="number" id="km" min="0" step="0.1" placeholder="Например: 12">
          </div>
          <div>
            <label>Время поездки, минут</label>
            <input type="number" id="minutes" min="0" step="1" placeholder="Например: 21">
          </div>
        </div>

        <div id="taxiFields" class="hidden">
          <label>Сумма такси</label>
          <input type="number" id="taxiAmount" min="0" step="0.01" placeholder="Например: 35">
        </div>

        <div class="switchLine">
          <input type="checkbox" id="roundTrip">
          <strong>Туда и обратно</strong>
        </div>

        <label>Комментарий</label>
        <textarea id="comment" placeholder="Например: встреча с клиентом"></textarea>

        <div class="totalBox">
          <span>Итоговая сумма</span>
          <strong id="totalPreview">0.00 сомони</strong>
        </div>

        <button class="btnFull btnGreen saveBtn" id="saveBtn" onclick="saveTrip()">✅ Сохранить поездку</button>
      </div>

      <div class="card">
        <button class="btnFull btnGhost" onclick="toggleForm()" id="formToggleBtn">➕ Добавить новую поездку</button>

        <button class="btnFull btnGhost" onclick="toggleReport()" id="reportToggleBtn" style="margin-top:12px;">
          📊 Открыть отчет за месяц
        </button>

        <div id="reportPanel" class="hidden" style="margin-top:16px;">
          <h2>Отчет за месяц</h2>

          <div class="filters">
            <select id="monthFilter" onchange="applyMonthFilter()">
              <option value="">Все месяцы</option>
            </select>
            <button onclick="applyMonthFilter()">Показать</button>
          </div>

          <div class="reportGrid">
            <div class="mini">
              <span>Поездок</span>
              <strong id="reportCount">0</strong>
            </div>
            <div class="mini">
              <span>Сумма</span>
              <strong id="reportTotal">0</strong>
            </div>
            <div class="mini">
              <span>Месяц</span>
              <strong id="reportMonth">Все</strong>
            </div>
          </div>

          <div id="employeeReport"></div>

          <button class="btnFull btnGhost" onclick="toggleExportActions()" id="exportToggleBtn">
            📤 Экспорт отчета
          </button>

          <div class="exportActions" id="exportActions">
            <button onclick="exportPDF()">📄 PDF</button>
            <button onclick="exportExcel()">📊 Excel</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <h2>Список поездок</h2>
      <div id="tripList" class="list"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz6cQEAutRsRHlA2u9Ebz7kAesgXsqv59QE35VMDiDU2Pq7af0x-snvD29AIpkpTFVk/exec';

    let transportType = 'car';
    let allTrips = [];
    let currentMonth = '';
    let routePointIndex = 3;
    let pointsCache = [];

    let currentUser = localStorage.getItem('smartpay_user') || '';
    let currentRole = localStorage.getItem('smartpay_role') || '';

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('date').valueAsDate = new Date();

      const savedLogin = localStorage.getItem('smartpay_last_login') || '';
      document.getElementById('loginEmployee').value = savedLogin;

      ['km','minutes','taxiAmount','roundTrip'].forEach(id => {
        document.getElementById(id).addEventListener('input', updatePreview);
        document.getElementById(id).addEventListener('change', updatePreview);
      });

      ['from','to'].forEach(id => {
        document.getElementById(id).addEventListener('change', applyRouteHistory);
      });

      document.getElementById('loginPin').addEventListener('keydown', event => {
        if (event.key === 'Enter') login();
      });

      registerPWA();

      if (currentUser) {
        document.getElementById('loginScreen').style.display = 'none';
        reloadData();
      }
    });

    function api(action, params = {}) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        params.action = action;
        params.callback = callbackName;

        const query = Object.keys(params)
          .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
          .join('&');

        const script = document.createElement('script');
        script.src = API_URL + '?' + query;

        window[callbackName] = function(data) {
          delete window[callbackName];
          if (script.parentNode) document.body.removeChild(script);
          resolve(data);
        };

        script.onerror = function() {
          delete window[callbackName];
          if (script.parentNode) document.body.removeChild(script);
          reject(new Error('Ошибка подключения к серверу'));
        };

        document.body.appendChild(script);
      });
    }

    async function login() {
      const employeeName = document.getElementById('loginEmployee').value.trim();
      const pin = document.getElementById('loginPin').value.trim();

      if (!employeeName || !pin) {
        alert('Введите имя сотрудника и PIN');
        return;
      }

      try {
        const res = await api('login', { employee: employeeName, pin });

        if (!res.ok) {
          alert(res.error || 'Неверный сотрудник или PIN');
          return;
        }

        currentUser = res.employee;
        currentRole = res.role || 'user';

        localStorage.setItem('smartpay_user', currentUser);
        localStorage.setItem('smartpay_role', currentRole);
        localStorage.setItem('smartpay_last_login', employeeName);

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('loginPin').value = '';

        reloadData();
      } catch (err) {
        alert('Ошибка входа: ' + err.message);
      }
    }

    function logout() {
      localStorage.removeItem('smartpay_user');
      localStorage.removeItem('smartpay_role');
      currentUser = '';
      currentRole = '';
      allTrips = [];
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('tripList').innerHTML = '';
      document.getElementById('topUser').textContent = '';
    }

    async function reloadData() {
      try {
        showToast('Загрузка данных...');

        const data = await api('init', {
          employee: currentUser,
          role: currentRole
        });

        if (!data.ok) throw new Error(data.error || 'Ошибка загрузки');

        allTrips = data.trips || [];
        pointsCache = data.points || [];

        fillPointsDatalist();
        fillMonths(data.months || []);

        applyMonthFilter();
        updatePreview();
        updateTopUser();

        showToast('Данные обновлены');
      } catch (err) {
        alert('Ошибка: ' + err.message);
      }
    }

    function updateTopUser() {
      const roleText = currentRole === 'admin' ? 'админ' : 'сотрудник';
      document.getElementById('topUser').textContent = currentUser ? `Вход: ${currentUser} · ${roleText}` : '';
    }

    function fillPointsDatalist() {
      const list = document.getElementById('pointsList');
      list.innerHTML = '';
      pointsCache.forEach(point => {
        const option = document.createElement('option');
        option.value = point;
        list.appendChild(option);
      });
    }

    function fillMonths(months) {
      const select = document.getElementById('monthFilter');
      const selected = select.value;
      select.innerHTML = '<option value="">Все месяцы</option>';

      months.forEach(month => {
        const option = document.createElement('option');
        option.value = month;
        option.textContent = formatMonthName(month);
        select.appendChild(option);
      });

      if (selected) select.value = selected;
    }

    function formatMonthName(month) {
      const names = {
        '01':'Январь','02':'Февраль','03':'Март','04':'Апрель',
        '05':'Май','06':'Июнь','07':'Июль','08':'Август',
        '09':'Сентябрь','10':'Октябрь','11':'Ноябрь','12':'Декабрь'
      };

      if (!month || !month.includes('-')) return month;

      const [year, m] = month.split('-');
      return `${names[m] || m} ${year}`;
    }

    function toggleForm() {
      const form = document.getElementById('formCard');
      const btn = document.getElementById('formToggleBtn');

      form.classList.toggle('hidden');
      btn.textContent = form.classList.contains('hidden')
        ? '➕ Добавить новую поездку'
        : '✖️ Скрыть новую поездку';

      if (!form.classList.contains('hidden')) {
        setTimeout(() => form.scrollIntoView({ behavior:'smooth', block:'start' }), 80);
      }
    }

    function toggleReport() {
      const panel = document.getElementById('reportPanel');
      const btn = document.getElementById('reportToggleBtn');

      panel.classList.toggle('hidden');
      btn.textContent = panel.classList.contains('hidden')
        ? '📊 Открыть отчет за месяц'
        : '📊 Скрыть отчет за месяц';
    }

    function toggleExportActions() {
      const panel = document.getElementById('exportActions');
      const btn = document.getElementById('exportToggleBtn');

      panel.classList.toggle('show');
      btn.textContent = panel.classList.contains('show') ? '📤 Скрыть экспорт' : '📤 Экспорт отчета';
    }

    function setTransport(type) {
      transportType = type;

      document.getElementById('carBtn').classList.toggle('active', type === 'car');
      document.getElementById('taxiBtn').classList.toggle('active', type === 'taxi');

      document.getElementById('carFields').classList.toggle('hidden', type !== 'car');
      document.getElementById('taxiFields').classList.toggle('hidden', type !== 'taxi');

      updatePreview();
    }

    function addRoutePoint() {
      const container = document.getElementById('routeFields');
      const letters = { 3:'C', 4:'D', 5:'E', 6:'F', 7:'G', 8:'H' };
      const letter = letters[routePointIndex] || routePointIndex;

      const block = document.createElement('div');
      block.className = 'row extraPointRow';
      block.innerHTML = `
        <div>
          <label>Точка ${letter}</label>
          <input list="pointsList" class="extraPoint" placeholder="Введите или выберите точку ${letter}">
        </div>
        <div>
          <label>&nbsp;</label>
          <button type="button" class="btnRed smallRemove" onclick="this.closest('.extraPointRow').remove(); applyRouteHistory();">Удалить</button>
        </div>
      `;

      container.appendChild(block);
      block.querySelector('.extraPoint').addEventListener('change', applyRouteHistory);
      routePointIndex++;
    }

    function applyRouteHistory() {
      const fromValue = document.getElementById('from').value.trim();
      const toValue = document.getElementById('to').value.trim();

      if (!fromValue || !toValue) return;

      const sameRoute = allTrips.find(t => {
        const route = String(t.from || '');
        return route.startsWith(fromValue) && route.endsWith(toValue);
      });

      if (!sameRoute) return;

      const parts = String(sameRoute.from || '').split('→').map(x => x.trim()).filter(Boolean);
      if (parts.length <= 2) return;

      document.querySelectorAll('.extraPointRow').forEach(row => row.remove());
      routePointIndex = 3;

      const middle = parts.slice(1, -1);
      middle.forEach(point => {
        addRoutePoint();
        const inputs = document.querySelectorAll('.extraPoint');
        inputs[inputs.length - 1].value = point;
      });

      showToast('Маршрут подставлен из истории');
    }

    function getPayload() {
      const extraPoints = [...document.querySelectorAll('.extraPoint')]
        .map(input => input.value.trim())
        .filter(Boolean);

      const fromValue = document.getElementById('from').value.trim();
      const toValue = document.getElementById('to').value.trim();

      return {
        date: document.getElementById('date').value,
        employee: currentUser,
        from: fromValue,
        to: toValue,
        extraPoints,
        routeText: [fromValue, ...extraPoints, toValue].filter(Boolean).join(' → '),
        transportType,
        km: Number(document.getElementById('km').value || 0),
        minutes: Number(document.getElementById('minutes').value || 0),
        taxiAmount: Number(document.getElementById('taxiAmount').value || 0),
        roundTrip: document.getElementById('roundTrip').checked,
        comment: document.getElementById('comment').value.trim()
      };
    }

    function calculateLocal(payload) {
      let total = 0;

      if (payload.transportType === 'car') {
        const kmAmount = payload.km <= 0 ? 0 : 10 + Math.max(0, payload.km - 3) * 3;
        const timeAmount = Math.max(0, payload.minutes - 20) * 0.10;
        total = kmAmount + timeAmount;
      } else {
        total = payload.taxiAmount;
      }

      if (payload.roundTrip) total *= 2;

      return Math.round((total + Number.EPSILON) * 100) / 100;
    }

    function updatePreview() {
      const total = calculateLocal(getPayload());
      document.getElementById('totalPreview').textContent = total.toFixed(2) + ' сомони';
    }

    async function saveTrip() {
      const saveBtn = document.getElementById('saveBtn');

      try {
        const payload = getPayload();

        if (!payload.date) return alert('Укажите дату');
        if (!payload.employee) return alert('Не определен сотрудник. Выйдите и войдите заново.');
        if (!payload.from) return alert('Укажите точку А');
        if (!payload.to) return alert('Укажите конечную точку');

        saveBtn.classList.add('saving');
        saveBtn.textContent = 'Сохраняем поездку...';

        const result = await api('addTrip', { payload: JSON.stringify(payload) });
        if (!result.ok) throw new Error(result.error || 'Ошибка сохранения');

        allTrips = result.trips || [];

        clearForm();
        fillMonths(result.months || []);
        applyMonthFilter();
        showToast('Поездка сохранена');

        document.getElementById('formCard').classList.add('hidden');
        document.getElementById('formToggleBtn').textContent = '➕ Добавить новую поездку';
      } catch (err) {
        alert('Ошибка сохранения: ' + err.message);
      } finally {
        saveBtn.classList.remove('saving');
        saveBtn.textContent = '✅ Сохранить поездку';
      }
    }

    function clearForm() {
      document.getElementById('date').valueAsDate = new Date();
      document.getElementById('from').value = '';
      document.getElementById('to').value = '';
      document.getElementById('km').value = '';
      document.getElementById('minutes').value = '';
      document.getElementById('taxiAmount').value = '';
      document.getElementById('comment').value = '';
      document.getElementById('roundTrip').checked = false;

      document.querySelectorAll('.extraPointRow').forEach(row => row.remove());
      routePointIndex = 3;

      updatePreview();
    }

    function applyMonthFilter() {
      currentMonth = document.getElementById('monthFilter').value;
      const filtered = currentMonth
        ? allTrips.filter(item => item.month === currentMonth)
        : allTrips;

      renderTrips(filtered);
      renderReport(filtered);
    }

    function getFilteredTrips() {
      return currentMonth
        ? allTrips.filter(item => item.month === currentMonth)
        : allTrips;
    }

    function renderTrips(trips) {
      const list = document.getElementById('tripList');

      if (!trips.length) {
        list.innerHTML = '<div class="trip">Пока нет поездок</div>';
        return;
      }

      list.innerHTML = trips.map(trip => `
        <div class="trip">
          <div class="tripTop">
            <div>
              <div class="tripTitle">${escapeHtml(trip.employee)}</div>
              <div class="tripMeta">${escapeHtml(trip.date)} · ${escapeHtml(trip.transport)}</div>
            </div>
            <div class="tripTotal">${Number(trip.total).toFixed(2)} с.</div>
          </div>
          <div class="tripMeta">
            📍 ${escapeHtml(trip.from)}<br>
            ${trip.transport === 'Такси'
              ? `🚕 Такси: ${trip.taxiAmount || 0} с.`
              : `🚗 ${trip.km || 0} км · ${trip.minutes || 0} мин`
            }
            ${trip.roundTrip === 'Да' ? '<br>🔁 Туда и обратно' : ''}
            ${trip.comment ? `<br>💬 ${escapeHtml(trip.comment)}` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderReport(sourceTrips) {
      const trips = sourceTrips || allTrips;
      const total = trips.reduce((sum, item) => sum + Number(item.total || 0), 0);

      document.getElementById('reportCount').textContent = trips.length;
      document.getElementById('reportTotal').textContent = total.toFixed(2);
      document.getElementById('reportMonth').textContent = currentMonth ? formatMonthName(currentMonth) : 'Все';

      const map = {};
      trips.forEach(trip => {
        if (!map[trip.employee]) map[trip.employee] = { count: 0, total: 0 };
        map[trip.employee].count++;
        map[trip.employee].total += Number(trip.total || 0);
      });

      document.getElementById('employeeReport').innerHTML = Object.keys(map).map(employee => `
        <div class="employeeReport">
          <strong>${escapeHtml(employee)}</strong><br>
          Поездок: ${map[employee].count} · Сумма: ${map[employee].total.toFixed(2)} сомони
        </div>
      `).join('') || '<div class="employeeReport">Нет данных</div>';
    }

    function exportPDF() {
      const trips = getFilteredTrips();
      const monthName = currentMonth ? formatMonthName(currentMonth) : 'Все месяцы';

      let html = `
        <html>
        <head>
          <title>Отчет Smartpay</title>
          <style>
            body { font-family: Arial; padding: 24px; color:#111827; }
            h1 { color:#073f52; }
            table { width:100%; border-collapse:collapse; margin-top:16px; }
            th,td { border:1px solid #d1d5db; padding:8px; font-size:12px; }
            th { background:#073f52; color:white; }
            .total { margin-top:18px; font-size:18px; font-weight:bold; }
          </style>
        </head>
        <body>
          <h1>Smartpay — отчет по поездкам</h1>
          <p>Период: ${monthName}</p>
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Сотрудник</th>
                <th>Маршрут</th>
                <th>Транспорт</th>
                <th>Км</th>
                <th>Мин</th>
                <th>Сумма</th>
              </tr>
            </thead>
            <tbody>
      `;

      trips.forEach(t => {
        html += `
          <tr>
            <td>${escapeHtml(t.date)}</td>
            <td>${escapeHtml(t.employee)}</td>
            <td>${escapeHtml(t.from)}</td>
            <td>${escapeHtml(t.transport)}</td>
            <td>${t.km || ''}</td>
            <td>${t.minutes || ''}</td>
            <td>${Number(t.total || 0).toFixed(2)}</td>
          </tr>
        `;
      });

      const total = trips.reduce((sum, t) => sum + Number(t.total || 0), 0);
      html += `
            </tbody>
          </table>
          <div class="total">Итого: ${total.toFixed(2)} сомони</div>
        </body>
        </html>
      `;

      const win = window.open('', '_blank');
      win.document.write(html);
      win.document.close();
      win.print();
    }

    function exportExcel() {
      const trips = getFilteredTrips();
      const monthName = currentMonth ? formatMonthName(currentMonth) : 'Все месяцы';

      let csv = '\uFEFF';
      csv += 'Дата;Сотрудник;Маршрут;Транспорт;Километраж;Время;Такси;Туда и обратно;Сумма;Комментарий\n';

      trips.forEach(t => {
        csv += [
          t.date,
          t.employee,
          t.from,
          t.transport,
          t.km || '',
          t.minutes || '',
          t.taxiAmount || '',
          t.roundTrip || '',
          Number(t.total || 0).toFixed(2),
          t.comment || ''
        ].map(v => `"${String(v).replaceAll('"', '""')}"`).join(';') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `Smartpay_report_${monthName}.csv`;
      link.click();
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 1800);
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function registerPWA() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => reg.update())
          .catch(() => {});
      }
    }
  </script>
</body>
</html>
