<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Smartpay — Учет поездок</title>

  <style>
    :root {
      --bg1: #073f52;
      --bg2: #1e1b4b;
      --glass: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.22);
      --text: #ffffff;
      --muted: #9cc8e8;
      --green: #22c55e;
      --red: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(109, 40, 217, 0.4), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .app {
      width: min(1200px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logoBox {
      width: 58px;
      height: 58px;
      border-radius: 20px;
      background: rgba(255,255,255,.12);
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,.25);
    }

    .logoText {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -1px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 18px;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(22px);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 16px;
      padding: 14px;
      outline: none;
      color: white;
      background: rgba(255,255,255,.12);
      font-size: 15px;
      margin-bottom: 14px;
    }

    option {
      color: #111827;
    }

    textarea {
      resize: vertical;
      min-height: 76px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .transport {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .transport button {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
    }

    .transport button.active {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
    }

    button {
      border: none;
      color: white;
      padding: 14px 18px;
      border-radius: 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #6d28d9, #2563eb);
      transition: .2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .btnFull {
      width: 100%;
      margin-top: 6px;
    }

    .btnGreen {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .btnRed {
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }

    .btnGhost {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
    }

    .totalBox {
      padding: 18px;
      background: rgba(14,165,233,.22);
      border: 1px solid rgba(14,165,233,.5);
      border-radius: 18px;
      margin-bottom: 14px;
    }

    .totalBox span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .totalBox strong {
      font-size: 26px;
    }

    .switchLine {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .switchLine input {
      width: 20px;
      height: 20px;
      margin: 0;
    }

    .hidden {
      display: none;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .reportGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .mini {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
    }

    .mini span {
      color: var(--muted);
      font-size: 12px;
    }

    .mini strong {
      display: block;
      font-size: 20px;
      margin-top: 5px;
    }

    .employeeReport {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.09);
      margin-bottom: 8px;
      font-size: 14px;
    }

    .exportPanel {
      margin-top: 12px;
    }

    .exportActions {
      display: none;
      gap: 10px;
      margin-top: 10px;
    }

    .exportActions.show {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }

    .list {
      display: grid;
      gap: 12px;
      max-height: 480px;
      overflow: auto;
      padding-right: 4px;
    }

    .trip {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
    }

    .tripTop {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .tripTitle {
      font-weight: 900;
    }

    .tripMeta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .tripTotal {
      font-size: 18px;
      font-weight: 900;
      color: #a7f3d0;
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 14px 18px;
      background: rgba(0,0,0,.75);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 16px;
      display: none;
      z-index: 1000;
    }

    @media (max-width: 768px) {
      .app {
        padding: 12px;
      }

      h1 {
        font-size: 22px;
      }

      .logoBox {
        width: 48px;
        height: 48px;
        border-radius: 16px;
      }

      .logoText {
        font-size: 15px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 16px;
        border-radius: 22px;
      }

      .row,
      .transport,
      .filters,
      .reportGrid,
      .exportActions.show {
        grid-template-columns: 1fr;
      }

      input,
      select,
      textarea,
      button {
        font-size: 16px;
        min-height: 48px;
      }

      .tripTop {
        flex-direction: column;
      }

      .tripTotal {
        font-size: 22px;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .brand {
        align-items: center;
      }

      .btnFull {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="brand">
        <div class="logoBox">
          <div class="logoText">S PAY</div>
        </div>
        <div>
          <h1>🚗 Учет поездок</h1>
          <div class="subtitle">Smartpay — контроль поездок сотрудников</div>
        </div>
      </div>

      <button class="btnGhost" onclick="reloadData()">🔄 Обновить</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Новая поездка</h2>

        <div class="row">
          <div>
            <label>Дата поездки</label>
            <input type="date" id="date">
          </div>

          <div>
            <label>Сотрудник</label>
            <input list="employeesList" id="employee" placeholder="Выберите или введите">
            <datalist id="employeesList"></datalist>
          </div>
        </div>

        <div id="routeFields">
          <div class="row">
            <div>
              <label>Точка А</label>
              <input list="pointsList" id="from" placeholder="Откуда">
            </div>

            <div>
              <label>Точка Б</label>
              <input list="pointsList" id="to" placeholder="Куда">
            </div>
          </div>
        </div>

        <datalist id="pointsList"></datalist>

        <button class="btnFull btnGhost" onclick="addRoutePoint()">+ Добавить точку</button>

        <label style="margin-top:14px;">Тип транспорта</label>
        <div class="transport">
          <button id="carBtn" class="active" onclick="setTransport('car')">🚗 Своя машина</button>
          <button id="taxiBtn" onclick="setTransport('taxi')">🚕 Такси</button>
        </div>

        <div id="carFields" class="row">
          <div>
            <label>Километраж</label>
            <input type="number" id="km" min="0" step="0.1" placeholder="Например: 12">
          </div>

          <div>
            <label>Время поездки, минут</label>
            <input type="number" id="minutes" min="0" step="1" placeholder="Например: 21">
          </div>
        </div>

        <div id="taxiFields" class="hidden">
          <label>Сумма такси</label>
          <input type="number" id="taxiAmount" min="0" step="0.01" placeholder="Например: 35">
        </div>

        <div class="switchLine">
          <input type="checkbox" id="roundTrip">
          <strong>Туда и обратно</strong>
        </div>

        <label>Комментарий</label>
        <textarea id="comment" placeholder="Например: встреча с клиентом"></textarea>

        <div class="totalBox">
          <span>Итоговая сумма</span>
          <strong id="totalPreview">0.00 сомони</strong>
        </div>

        <button class="btnFull btnGreen" onclick="saveTrip()">✅ Сохранить поездку</button>
      </div>

      <div class="card">
        <button class="btnFull btnGhost" onclick="toggleReport()" id="reportToggleBtn">
          📊 Открыть отчет за месяц
        </button>

        <div id="reportPanel" class="hidden" style="margin-top:16px;">
          <h2>Отчет за месяц</h2>

          <div class="filters">
            <select id="monthFilter" onchange="applyMonthFilter()">
              <option value="">Все месяцы</option>
            </select>

            <button onclick="applyMonthFilter()">Показать</button>
          </div>

          <div class="reportGrid">
            <div class="mini">
              <span>Поездок</span>
              <strong id="reportCount">0</strong>
            </div>

            <div class="mini">
              <span>Сумма</span>
              <strong id="reportTotal">0</strong>
            </div>

            <div class="mini">
              <span>Месяц</span>
              <strong id="reportMonth">Все</strong>
            </div>
          </div>

          <div id="employeeReport"></div>

          <div class="exportPanel">
            <button class="btnFull btnGhost" onclick="toggleExportActions()" id="exportToggleBtn">
              📤 Экспорт / отправка
            </button>

            <div class="exportActions" id="exportActions">
              <button onclick="exportPDF()">📄 PDF</button>
              <button onclick="exportExcel()">📊 Excel</button>
              <button onclick="sendTelegramReport()">📩 Telegram</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <h2>Список поездок</h2>
      <div id="tripList" class="list"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbywU34N4EJMwl_bCLM5BoUDif43oxYzLdTuh3Ji2JcuYbO3nFm4LDm42Bui8aydkVBO/exec';

    let transportType = 'car';
    let allTrips = [];
    let currentMonth = '';
    let routePointIndex = 3;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('date').valueAsDate = new Date();

      ['km', 'minutes', 'taxiAmount', 'roundTrip'].forEach(id => {
        document.getElementById(id).addEventListener('input', updatePreview);
        document.getElementById(id).addEventListener('change', updatePreview);
      });

      reloadData();
    });

    function api(action, params = {}) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

        params.action = action;
        params.callback = callbackName;

        const query = Object.keys(params)
          .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(params[key]))
          .join('&');

        const script = document.createElement('script');
        script.src = API_URL + '?' + query;

        window[callbackName] = function(data) {
          delete window[callbackName];
          document.body.removeChild(script);
          resolve(data);
        };

        script.onerror = function() {
          delete window[callbackName];
          document.body.removeChild(script);
          reject(new Error('Ошибка подключения к серверу'));
        };

        document.body.appendChild(script);
      });
    }

    async function reloadData() {
      try {
        showToast('Загрузка данных...');
        const data = await api('init');

        if (!data.ok) throw new Error(data.error || 'Ошибка загрузки');

        allTrips = data.trips || [];

        fillDatalist('pointsList', data.points || []);
        fillDatalist('employeesList', data.employees || []);
        fillMonths(data.months || []);

        applyMonthFilter();
        updatePreview();

        showToast('Данные обновлены');
      } catch (err) {
        alert('Ошибка: ' + err.message);
      }
    }

    function fillDatalist(id, items) {
      const el = document.getElementById(id);
      el.innerHTML = '';

      items.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        el.appendChild(option);
      });
    }

    function fillMonths(months) {
      const select = document.getElementById('monthFilter');
      const selected = select.value;

      select.innerHTML = '<option value="">Все месяцы</option>';

      months.forEach(month => {
        const option = document.createElement('option');
        option.value = month;
        option.textContent = formatMonthName(month);
        select.appendChild(option);
      });

      select.value = selected;
    }

    function formatMonthName(month) {
      const names = {
        '01': 'Январь',
        '02': 'Февраль',
        '03': 'Март',
        '04': 'Апрель',
        '05': 'Май',
        '06': 'Июнь',
        '07': 'Июль',
        '08': 'Август',
        '09': 'Сентябрь',
        '10': 'Октябрь',
        '11': 'Ноябрь',
        '12': 'Декабрь'
      };

      if (!month || !month.includes('-')) return month;

      const [year, m] = month.split('-');
      return `${names[m]} ${year}`;
    }

    function toggleReport() {
      const panel = document.getElementById('reportPanel');
      const btn = document.getElementById('reportToggleBtn');

      panel.classList.toggle('hidden');

      btn.textContent = panel.classList.contains('hidden')
        ? '📊 Открыть отчет за месяц'
        : '📊 Скрыть отчет за месяц';
    }

    function toggleExportActions() {
      const panel = document.getElementById('exportActions');
      const btn = document.getElementById('exportToggleBtn');

      panel.classList.toggle('show');

      btn.textContent = panel.classList.contains('show')
        ? '📤 Скрыть экспорт / отправку'
        : '📤 Экспорт / отправка';
    }

    function setTransport(type) {
      transportType = type;

      document.getElementById('carBtn').classList.toggle('active', type === 'car');
      document.getElementById('taxiBtn').classList.toggle('active', type === 'taxi');

      document.getElementById('carFields').classList.toggle('hidden', type !== 'car');
      document.getElementById('taxiFields').classList.toggle('hidden', type !== 'taxi');

      updatePreview();
    }

    function addRoutePoint() {
      const container = document.getElementById('routeFields');
      const letters = { 3: 'C', 4: 'D', 5: 'E', 6: 'F', 7: 'G', 8: 'H' };
      const letter = letters[routePointIndex] || routePointIndex;

      const block = document.createElement('div');
      block.className = 'row extraPointRow';
      block.innerHTML = `
        <div>
          <label>Точка ${letter}</label>
          <input list="pointsList" class="extraPoint" placeholder="Введите точку ${letter}">
        </div>

        <div>
          <label>&nbsp;</label>
          <button type="button" class="btnRed btnFull" onclick="this.closest('.extraPointRow').remove()">Удалить точку</button>
        </div>
      `;

      container.appendChild(block);
      routePointIndex++;
    }

    function getPayload() {
      const extraPoints = Array.from(document.querySelectorAll('.extraPoint'))
        .map(input => input.value.trim())
        .filter(Boolean);

      return {
        date: document.getElementById('date').value,
        employee: document.getElementById('employee').value.trim(),
        from: document.getElementById('from').value.trim(),
        to: document.getElementById('to').value.trim(),
        extraPoints: extraPoints,
        routeText: [
          document.getElementById('from').value.trim(),
          ...extraPoints,
          document.getElementById('to').value.trim()
        ].filter(Boolean).join(' → '),
        transportType,
        km: Number(document.getElementById('km').value || 0),
        minutes: Number(document.getElementById('minutes').value || 0),
        taxiAmount: Number(document.getElementById('taxiAmount').value || 0),
        roundTrip: document.getElementById('roundTrip').checked,
        comment: document.getElementById('comment').value.trim()
      };
    }

    function calculateLocal(payload) {
      let total = 0;

      if (payload.transportType === 'car') {
        const kmAmount = payload.km <= 0 ? 0 : 10 + Math.max(0, payload.km - 3) * 3;
        const timeAmount = Math.max(0, payload.minutes - 20) * 0.10;
        total = kmAmount + timeAmount;
      } else {
        total = payload.taxiAmount;
      }

      if (payload.roundTrip) total *= 2;

      return Math.round((total + Number.EPSILON) * 100) / 100;
    }

    function updatePreview() {
      const total = calculateLocal(getPayload());
      document.getElementById('totalPreview').textContent = total.toFixed(2) + ' сомони';
    }

    async function saveTrip() {
      try {
        const payload = getPayload();

        if (!payload.date) return alert('Укажите дату');
        if (!payload.employee) return alert('Укажите сотрудника');
        if (!payload.from) return alert('Укажите точку А');
        if (!payload.to) return alert('Укажите конечную точку');

        const result = await api('addTrip', {
          payload: JSON.stringify(payload)
        });

        if (!result.ok) throw new Error(result.error || 'Ошибка сохранения');

        allTrips = result.trips || [];

        clearForm();
        fillMonths(result.months || []);
        applyMonthFilter();

        showToast('Поездка сохранена');
      } catch (err) {
        alert('Ошибка сохранения: ' + err.message);
      }
    }

    function clearForm() {
      document.getElementById('km').value = '';
      document.getElementById('minutes').value = '';
      document.getElementById('taxiAmount').value = '';
      document.getElementById('comment').value = '';
      document.getElementById('roundTrip').checked = false;

      document.querySelectorAll('.extraPointRow').forEach(row => row.remove());
      routePointIndex = 3;

      updatePreview();
    }

    async function deleteTrip(id) {
      if (!confirm('Удалить эту поездку?')) return;

      try {
        const result = await api('deleteTrip', { id });

        if (!result.ok) throw new Error(result.error || 'Ошибка удаления');

        allTrips = result.trips || [];
        fillMonths(result.months || []);
        applyMonthFilter();

        showToast('Запись удалена');
      } catch (err) {
        alert('Ошибка удаления: ' + err.message);
      }
    }

    function applyMonthFilter() {
      currentMonth = document.getElementById('monthFilter').value;

      const filtered = currentMonth
        ? allTrips.filter(item => item.month === currentMonth)
        : allTrips;

      renderTrips(filtered);
      renderReport(filtered);
    }

    function getFilteredTrips() {
      return currentMonth
        ? allTrips.filter(item => item.month === currentMonth)
        : allTrips;
    }

    function renderTrips(trips) {
      const list = document.getElementById('tripList');

      if (!trips.length) {
        list.innerHTML = '<div class="trip">Пока нет поездок</div>';
        return;
      }

      list.innerHTML = trips.map(trip => `
        <div class="trip">
          <div class="tripTop">
            <div>
              <div class="tripTitle">${escapeHtml(trip.employee)}</div>
              <div class="tripMeta">${escapeHtml(trip.date)} · ${escapeHtml(trip.transport)}</div>
            </div>
            <div class="tripTotal">${Number(trip.total).toFixed(2)} с.</div>
          </div>

          <div class="tripMeta">
            📍 ${escapeHtml(trip.from)}<br>
            ${trip.transport === 'Такси'
              ? `🚕 Такси: ${trip.taxiAmount || 0} с.`
              : `🚗 ${trip.km || 0} км · ${trip.minutes || 0} мин`
            }
            ${trip.roundTrip === 'Да' ? '<br>🔁 Туда и обратно' : ''}
            ${trip.comment ? `<br>💬 ${escapeHtml(trip.comment)}` : ''}
          </div>

          <button class="btnRed" style="margin-top:10px;" onclick="deleteTrip('${trip.id}')">Удалить</button>
        </div>
      `).join('');
    }

    function renderReport(sourceTrips) {
      const trips = sourceTrips || allTrips;
      const total = trips.reduce((sum, item) => sum + Number(item.total || 0), 0);

      document.getElementById('reportCount').textContent = trips.length;
      document.getElementById('reportTotal').textContent = total.toFixed(2);
      document.getElementById('reportMonth').textContent = currentMonth ? formatMonthName(currentMonth) : 'Все';

      const map = {};

      trips.forEach(trip => {
        if (!map[trip.employee]) {
          map[trip.employee] = { count: 0, total: 0 };
        }

        map[trip.employee].count++;
        map[trip.employee].total += Number(trip.total || 0);
      });

      const html = Object.keys(map).map(employee => `
        <div class="employeeReport">
          <strong>${escapeHtml(employee)}</strong><br>
          Поездок: ${map[employee].count} · Сумма: ${map[employee].total.toFixed(2)} сомони
        </div>
      `).join('');

      document.getElementById('employeeReport').innerHTML = html || '<div class="employeeReport">Нет данных</div>';
    }

    function exportPDF() {
      const trips = getFilteredTrips();
      const monthName = currentMonth ? formatMonthName(currentMonth) : 'Все месяцы';

      let html = `
        <html>
        <head>
          <title>Отчет Smartpay</title>
          <style>
            body { font-family: Arial; padding: 24px; color: #111827; }
            h1 { color: #073f52; }
            table { width: 100%; border-collapse: collapse; margin-top: 16px; }
            th, td { border: 1px solid #d1d5db; padding: 8px; font-size: 12px; }
            th { background: #073f52; color: white; }
            .total { margin-top: 18px; font-size: 18px; font-weight: bold; }
          </style>
        </head>
        <body>
          <h1>Smartpay — отчет по поездкам</h1>
          <p>Период: ${monthName}</p>
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Сотрудник</th>
                <th>Маршрут</th>
                <th>Транспорт</th>
                <th>Км</th>
                <th>Мин</th>
                <th>Сумма</th>
              </tr>
            </thead>
            <tbody>
      `;

      trips.forEach(t => {
        html += `
          <tr>
            <td>${escapeHtml(t.date)}</td>
            <td>${escapeHtml(t.employee)}</td>
            <td>${escapeHtml(t.from)}</td>
            <td>${escapeHtml(t.transport)}</td>
            <td>${t.km || ''}</td>
            <td>${t.minutes || ''}</td>
            <td>${Number(t.total || 0).toFixed(2)}</td>
          </tr>
        `;
      });

      const total = trips.reduce((sum, t) => sum + Number(t.total || 0), 0);

      html += `
            </tbody>
          </table>
          <div class="total">Итого: ${total.toFixed(2)} сомони</div>
        </body>
        </html>
      `;

      const win = window.open('', '_blank');
      win.document.write(html);
      win.document.close();
      win.print();
    }

    function exportExcel() {
      const trips = getFilteredTrips();
      const monthName = currentMonth ? formatMonthName(currentMonth) : 'Все месяцы';

      let csv = '\uFEFF';
      csv += 'Дата;Сотрудник;Маршрут;Транспорт;Километраж;Время;Такси;Туда и обратно;Сумма;Комментарий\n';

      trips.forEach(t => {
        csv += [
          t.date,
          t.employee,
          t.from,
          t.transport,
          t.km || '',
          t.minutes || '',
          t.taxiAmount || '',
          t.roundTrip || '',
          Number(t.total || 0).toFixed(2),
          t.comment || ''
        ].map(v => `"${String(v).replaceAll('"', '""')}"`).join(';') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');

      link.href = URL.createObjectURL(blob);
      link.download = `Smartpay_report_${monthName}.csv`;
      link.click();
    }

    async function sendTelegramReport() {
      try {
        const result = await api('sendTelegramReport', {
          month: currentMonth || ''
        });

        if (!result.ok) {
          throw new Error(result.error || 'Ошибка отправки');
        }

        showToast('Отчет отправлен в Telegram');
      } catch (err) {
        alert('Ошибка Telegram: ' + err.message);
      }
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.style.display = 'block';

      setTimeout(() => {
        toast.style.display = 'none';
      }, 1800);
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
